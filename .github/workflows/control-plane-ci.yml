name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/lint.sh

  integration:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman buildah

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.23.0

      - name: Run build and integration tests
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish control plane image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
        run: |
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}"
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:latest"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:latest"
