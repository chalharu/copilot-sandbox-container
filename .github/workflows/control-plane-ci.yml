name: Control Plane CI
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  integration:
    name: Integration Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy: &architecture-matrix
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - &checkout-repo
        name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container
      - name: Restore buildx cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/control-plane-buildx-cache-${{ matrix.image_arch }}
          key: ${{ runner.os }}-${{ matrix.image_arch }}-control-plane-buildx-${{ hashFiles('containers/control-plane/Dockerfile', 'containers/control-plane/**/Cargo.toml', 'containers/control-plane/**/Cargo.lock', 'containers/control-plane/**/build.rs', 'containers/control-plane/**/proto/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.image_arch }}-control-plane-buildx-
      - name: Build integration images
        env:
          CONTROL_PLANE_BUILDX_CACHE_ROOT: /tmp/control-plane-buildx-cache-${{ matrix.image_arch }}
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --build-only
      - name: Save integration images
        run: docker save -o control-plane-images.tar localhost/control-plane:test
      - name: Upload integration images
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: control-plane-images.tar
          retention-days: 1
          compression-level: 0
  integration-smoke:
    name: Integration Smoke (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: integration
    strategy: *architecture-matrix
    permissions:
      contents: read
    steps:
      - *checkout-repo
      - &download-integration-images
        name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - &load-integration-images
        name: Load integration images
        run: docker load -i downloaded-images/control-plane-images.tar
      - name: Run smoke integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --skip-image-build --group smoke
  integration-regressions:
    name: Integration Regressions (x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: integration
    permissions:
      contents: read
    steps:
      - *checkout-repo
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container
      - name: Restore buildx cache (amd64)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/control-plane-buildx-cache-amd64
          key: ${{ runner.os }}-amd64-control-plane-buildx-${{ hashFiles('containers/control-plane/Dockerfile', 'containers/control-plane/**/Cargo.toml', 'containers/control-plane/**/Cargo.lock', 'containers/control-plane/**/build.rs', 'containers/control-plane/**/proto/**') }}
          restore-keys: |
            ${{ runner.os }}-amd64-control-plane-buildx-
      - name: Restore regression Rust cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/control-plane-rust-regression-cache
          key: ${{ runner.os }}-control-plane-rust-regressions-${{ hashFiles('containers/control-plane/Dockerfile', 'containers/control-plane/exec-api/Cargo.toml', 'containers/control-plane/exec-api/Cargo.lock', 'containers/control-plane/exec-api/build.rs', 'containers/control-plane/exec-api/src/**', 'containers/control-plane/exec-api/tests/**', 'containers/control-plane/exec-api/proto/**', 'scripts/test-session-exec.sh') }}
          restore-keys: |
            ${{ runner.os }}-control-plane-rust-regressions-
      - &download-integration-images-amd64
        name: Download integration images (amd64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-amd64
          path: downloaded-images
      - *load-integration-images
      - name: Run regression integration group
        env:
          CONTROL_PLANE_BUILDX_CACHE_ROOT: /tmp/control-plane-buildx-cache-amd64
          CONTROL_PLANE_RUST_CONTAINER_CACHE_ROOT: /tmp/control-plane-rust-regression-cache
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --skip-image-build --group regressions
  integration-kind-session:
    name: Integration Kind Session (x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: integration
    permissions:
      contents: read
    steps:
      - *checkout-repo
      - &setup-kubectl
        name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0
      - &setup-kind
        name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0
      - *download-integration-images-amd64
      - name: Run Kind session integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-session
  integration-kind-jobs:
    name: Integration Kind Jobs Core (x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: integration
    permissions:
      contents: read
    steps:
      - *checkout-repo
      - *setup-kubectl
      - *setup-kind
      - *download-integration-images-amd64
      - name: Run Kind job core integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-core
  integration-kind-jobs-transfer:
    name: Integration Kind Jobs Transfer (x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: integration
    permissions:
      contents: read
    steps:
      - *checkout-repo
      - *setup-kubectl
      - *setup-kind
      - *download-integration-images-amd64
      - name: Run Kind job transfer integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-transfer
  publish-architecture-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish Architecture Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs:
      - integration-smoke
      - integration-regressions
      - integration-kind-session
      - integration-kind-jobs
      - integration-kind-jobs-transfer
    strategy: *architecture-matrix
    permissions:
      contents: read
      packages: write
    steps:
      - *checkout-repo
      - *download-integration-images
      - *load-integration-images
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          test -n "${control_plane_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
      - name: Publish architecture image tags
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          CONTROL_PLANE_COMPONENT_TAG: ${{ steps.image_versions.outputs.control_plane_component_tag }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCH: ${{ matrix.image_arch }}
        run: |
          docker tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          docker tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}-${IMAGE_ARCH}"
          docker push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          docker push "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}-${IMAGE_ARCH}"
  publish-manifests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - publish-architecture-images
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          test -n "${control_plane_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Publish GHCR multi-arch manifests
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          CONTROL_PLANE_COMPONENT_TAG: ${{ steps.image_versions.outputs.control_plane_component_tag }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          create_manifest() {
            local target_ref="$1"
            shift
            docker buildx imagetools create --tag "${target_ref}" "$@"
          }

          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:latest" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
  cleanup-packages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: publish-manifests
    permissions:
      contents: read
      packages: write
    env:
      GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP: "30"
    strategy:
      fail-fast: false
      matrix:
        package_suffix:
          - control-plane
    steps:
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ format('{0}/{1}', github.event.repository.name, matrix.package_suffix) }}
          package-type: container
          min-versions-to-keep: ${{ env.GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP }}
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
