name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/lint.sh

  integration:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman buildah

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.23.0

      - name: Run build and integration tests
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh
