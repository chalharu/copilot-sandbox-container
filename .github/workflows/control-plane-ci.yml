name: Control Plane CI
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  lint:
    name: Lint (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    environment: dockerhub
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/lint.sh

  integration:
    name: Integration Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build integration images
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --build-only
      - name: Save integration images
        run: docker save -o control-plane-images.tar localhost/control-plane:test localhost/execution-plane-smoke:test
      - name: Upload integration images
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: control-plane-images.tar
          retention-days: 1
          compression-level: 0

  integration-smoke:
    name: Integration Smoke (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Load integration images
        run: docker load -i downloaded-images/control-plane-images.tar
      - name: Run smoke integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --skip-image-build --group smoke

  integration-regressions:
    name: Integration Regressions (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Load integration images
        run: docker load -i downloaded-images/control-plane-images.tar
      - name: Run regression integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
        run: ./scripts/build-test.sh --skip-image-build --group regressions

  integration-kind-session:
    name: Integration Kind Session (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0
      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Run Kind session integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-session

  integration-kind-jobs:
    name: Integration Kind Jobs Core (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0
      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Run Kind job core integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-core

  integration-kind-jobs-transfer:
    name: Integration Kind Jobs Transfer (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0
      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Run Kind job transfer integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: docker
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-transfer

  sccache-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Detect SCCACHE Image Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      sccache_changed: ${{ steps.detect.outputs.sccache_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect SCCACHE image changes
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          before_sha="${BEFORE_SHA}"
          changed_in_range() {
            local path="$1"
            if git diff --quiet "${before_sha}" "${GITHUB_SHA}" -- "${path}"; then
              printf 'false\n'
            else
              printf 'true\n'
            fi
          }

          if [[ -z "${before_sha}" ]] || [[ "${before_sha}" == '0000000000000000000000000000000000000000' ]]; then
            sccache_changed=true
          else
            sccache_changed="$(changed_in_range containers/sccache)"
          fi

          printf 'sccache_changed=%s\n' "${sccache_changed}" >> "${GITHUB_OUTPUT}"

  publish-architecture-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish Architecture Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    needs:
      - lint
      - integration-smoke
      - integration-regressions
      - integration-kind-session
      - integration-kind-jobs
      - integration-kind-jobs-transfer
      - sccache-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download integration images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images
      - name: Load integration images
        run: docker load -i downloaded-images/control-plane-images.tar
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Build sccache image for publishing
        if: needs.sccache-changes.outputs.sccache_changed == 'true'
        run: docker buildx build --load --tag localhost/sccache:test containers/sccache
      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          sccache_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${sccache_version}"
          {
            printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}"
            printf 'sccache_component_tag=%s\n' "${sccache_version}"
          } >> "${GITHUB_OUTPUT}"
      - name: Publish architecture image tags
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_SCCACHE_IMAGE: ghcr.io/${{ github.repository }}/sccache
          CONTROL_PLANE_COMPONENT_TAG: ${{ steps.image_versions.outputs.control_plane_component_tag }}
          SCCACHE_COMPONENT_TAG: ${{ steps.image_versions.outputs.sccache_component_tag }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCH: ${{ matrix.image_arch }}
          PUBLISH_SCCACHE: ${{ needs.sccache-changes.outputs.sccache_changed }}
        run: |
          docker tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          docker tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}-${IMAGE_ARCH}"
          docker push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          docker push "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}-${IMAGE_ARCH}"
          if [[ "${PUBLISH_SCCACHE}" == "true" ]]; then
            docker tag localhost/sccache:test "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            docker tag localhost/sccache:test "${GHCR_SCCACHE_IMAGE}:${SCCACHE_COMPONENT_TAG}-${IMAGE_ARCH}"
            docker push "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            docker push "${GHCR_SCCACHE_IMAGE}:${SCCACHE_COMPONENT_TAG}-${IMAGE_ARCH}"
          fi

  publish-manifests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - publish-architecture-images
      - sccache-changes
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          sccache_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${sccache_version}"
          {
            printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}"
            printf 'sccache_component_tag=%s\n' "${sccache_version}"
          } >> "${GITHUB_OUTPUT}"
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Publish GHCR multi-arch manifests
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_SCCACHE_IMAGE: ghcr.io/${{ github.repository }}/sccache
          CONTROL_PLANE_COMPONENT_TAG: ${{ steps.image_versions.outputs.control_plane_component_tag }}
          SCCACHE_COMPONENT_TAG: ${{ steps.image_versions.outputs.sccache_component_tag }}
          GITHUB_SHA: ${{ github.sha }}
          PUBLISH_SCCACHE: ${{ needs.sccache-changes.outputs.sccache_changed }}
        run: |
          create_manifest() {
            local target_ref="$1"
            shift
            docker buildx imagetools create --tag "${target_ref}" "$@"
          }

          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:latest" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "${GHCR_CONTROL_PLANE_IMAGE}:${CONTROL_PLANE_COMPONENT_TAG}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"

          if [[ "${PUBLISH_SCCACHE}" == "true" ]]; then
            create_manifest "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "${GHCR_SCCACHE_IMAGE}:latest" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "${GHCR_SCCACHE_IMAGE}:${SCCACHE_COMPONENT_TAG}" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
          fi

  cleanup-packages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: publish-manifests
    permissions:
      contents: read
      packages: write
    env:
      GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP: "30"
    strategy:
      fail-fast: false
      matrix:
        package_suffix:
          - control-plane
          - sccache
    steps:
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ format('{0}/{1}', github.event.repository.name, matrix.package_suffix) }}
          package-type: container
          min-versions-to-keep: ${{ env.GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP }}
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
