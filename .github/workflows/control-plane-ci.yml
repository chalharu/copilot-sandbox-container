name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/lint.sh

  integration:
    name: Integration (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1

      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc  # v0.6.2
        with:
          skipClusterLogsExport: true
          version: v0.24.0

      - name: Run build and integration tests
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build yamllint image for publishing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: podman build --tag localhost/yamllint:test containers/yamllint

      - name: Read published image versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          yamllint_version="$(sed -n 's/^ARG YAMLLINT_VERSION=//p' containers/yamllint/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${yamllint_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
          printf 'yamllint_component_tag=%s\n' "${yamllint_version}" >> "${GITHUB_OUTPUT}"

      - name: Publish architecture image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_YAMLLINT_IMAGE: ghcr.io/${{ github.repository }}/yamllint
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCH: ${{ matrix.image_arch }}
        run: |
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}-${IMAGE_ARCH}"
          podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}-${IMAGE_ARCH}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}-${IMAGE_ARCH}"
          podman push "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman push "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}-${IMAGE_ARCH}"

  publish-manifests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: integration
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          yamllint_version="$(sed -n 's/^ARG YAMLLINT_VERSION=//p' containers/yamllint/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${yamllint_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
          printf 'yamllint_component_tag=%s\n' "${yamllint_version}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish GHCR multi-arch manifests
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_YAMLLINT_IMAGE: ghcr.io/${{ github.repository }}/yamllint
          GITHUB_SHA: ${{ github.sha }}
        run: |
          create_manifest() {
            local manifest_name="$1"
            local target_ref="$2"
            shift 2
            podman manifest rm "${manifest_name}" >/dev/null 2>&1 || true
            podman manifest create "${manifest_name}"
            for source_ref in "$@"; do
              podman manifest add "${manifest_name}" "docker://${source_ref}"
            done
            podman manifest push --all "${manifest_name}" "docker://${target_ref}"
          }

          create_manifest "localhost/control-plane:manifest-sha" "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/control-plane:manifest-latest" "${GHCR_CONTROL_PLANE_IMAGE}:latest" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/control-plane:manifest-version" "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"

          create_manifest "localhost/yamllint:manifest-sha" "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/yamllint:manifest-latest" "${GHCR_YAMLLINT_IMAGE}:latest" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/yamllint:manifest-version" "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"

  cleanup-packages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: publish-manifests
    permissions:
      contents: read
      packages: write
    env:
      GHCR_MIN_VERSIONS_TO_KEEP: "30"
    strategy:
      fail-fast: false
      matrix:
        package_suffix:
          - control-plane
          - yamllint
    steps:
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5.0.0
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ format('{0}/{1}', github.event.repository.name, matrix.package_suffix) }}
          package-type: container
          min-versions-to-keep: ${{ env.GHCR_MIN_VERSIONS_TO_KEEP }}
          token: ${{ secrets.GITHUB_TOKEN }}
