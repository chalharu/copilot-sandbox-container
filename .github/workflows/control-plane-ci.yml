name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CONTROL_PLANE_DHI_CACHE_DIR: ${{ github.workspace }}/.cache/control-plane/dhi-images

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Restore DHI image cache
        uses: actions/cache@v4.3.0
        with:
          path: ${{ env.CONTROL_PLANE_DHI_CACHE_DIR }}
          key: ${{ runner.os }}-dhi-python-${{ hashFiles('containers/yamllint/Dockerfile', 'scripts/prepare-dhi-images.sh') }}

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/lint.sh

  integration:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    env:
      CONTROL_PLANE_DHI_CACHE_DIR: ${{ github.workspace }}/.cache/control-plane/dhi-images
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman buildah

      - name: Restore DHI image cache
        uses: actions/cache@v4.3.0
        with:
          path: ${{ env.CONTROL_PLANE_DHI_CACHE_DIR }}
          key: ${{ runner.os }}-dhi-python-${{ hashFiles('containers/yamllint/Dockerfile', 'scripts/prepare-dhi-images.sh') }}

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4.0.1

      - name: Set up Kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.23.0

      - name: Run build and integration tests
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build yamllint image for publishing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: buildah bud --tag localhost/yamllint:test containers/yamllint

      - name: Read published image versions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          yamllint_version="$(sed -n 's/^ARG YAMLLINT_VERSION=//p' containers/yamllint/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${yamllint_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
          printf 'yamllint_component_tag=%s\n' "${yamllint_version}" >> "${GITHUB_OUTPUT}"

      - name: Publish GHCR images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_YAMLLINT_IMAGE: ghcr.io/${{ github.repository }}/yamllint
        run: |
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}"
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:latest"
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}"
          podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}"
          podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:latest"
          podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:latest"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}"
          podman push "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}"
          podman push "${GHCR_YAMLLINT_IMAGE}:latest"
          podman push "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}"
