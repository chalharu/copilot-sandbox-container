name: Control Plane CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Run lint
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/lint.sh

  integration:
    name: Integration Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build integration images
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh --build-only

      - name: Save integration images
        run: podman save --multi-image-archive -o control-plane-images.tar localhost/control-plane:test localhost/execution-plane-smoke:test

      - name: Upload integration images
        uses: actions/upload-artifact@v7.0.0
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: control-plane-images.tar
          retention-days: 1
          compression-level: 0

  integration-smoke:
    name: Integration Smoke (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Load integration images
        run: podman load -i downloaded-images/control-plane-images.tar

      - name: Run smoke integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh --skip-image-build --group smoke

  integration-regressions:
    name: Integration Regressions (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Load integration images
        run: podman load -i downloaded-images/control-plane-images.tar

      - name: Prepare DHI images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Run regression integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
        run: ./scripts/build-test.sh --skip-image-build --group regressions

  integration-kind-session:
    name: Integration Kind Session (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1

      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc  # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Run Kind session integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-session

  integration-kind-jobs:
    name: Integration Kind Jobs Core (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1

      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc  # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Run Kind job core integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-core

  integration-kind-jobs-transfer:
    name: Integration Kind Jobs Transfer (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede  # v4.0.1

      - name: Set up Kind
        uses: engineerd/setup-kind@ecfad61750951586a9ef973db567df1d28671bdc  # v0.6.2
        with:
          skipClusterCreation: true
          skipClusterLogsExport: true
          version: v0.24.0

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Run Kind job transfer integration group
        env:
          CONTROL_PLANE_TOOLCHAIN: podman
          CONTROL_PLANE_KIND_IMAGE_ARCHIVE: downloaded-images/control-plane-images.tar
        run: ./scripts/build-test.sh --skip-image-build --group kind-jobs-transfer

  helper-image-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Detect Helper Image Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      yamllint_changed: ${{ steps.detect.outputs.yamllint_changed }}
      sccache_changed: ${{ steps.detect.outputs.sccache_changed }}
      sccache_dist_changed: ${{ steps.detect.outputs.sccache_dist_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect helper image changes
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          before_sha="${BEFORE_SHA}"
          changed_in_range() {
            local path="$1"
            if git diff --quiet "${before_sha}" "${GITHUB_SHA}" -- "${path}"; then
              printf 'false\n'
            else
              printf 'true\n'
            fi
          }

          if [[ -z "${before_sha}" ]] || [[ "${before_sha}" == '0000000000000000000000000000000000000000' ]]; then
            yamllint_changed=true
            sccache_changed=true
            sccache_dist_changed=true
          else
            yamllint_changed="$(changed_in_range containers/yamllint)"
            sccache_changed="$(changed_in_range containers/sccache)"
            sccache_dist_changed="$(changed_in_range containers/sccache-dist)"
          fi

          printf 'yamllint_changed=%s\n' "${yamllint_changed}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_changed=%s\n' "${sccache_changed}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_dist_changed=%s\n' "${sccache_dist_changed}" >> "${GITHUB_OUTPUT}"

  publish-architecture-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish Architecture Images (${{ matrix.architecture_label }})
    runs-on: ${{ matrix.runner }}
    needs:
      - lint
      - integration-smoke
      - integration-regressions
      - integration-kind-session
      - integration-kind-jobs
      - integration-kind-jobs-transfer
      - helper-image-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture_label: x64
            image_arch: amd64
            runner: ubuntu-24.04
          - architecture_label: aarch64
            image_arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Download integration images
        uses: actions/download-artifact@v8.0.1
        with:
          name: control-plane-images-${{ matrix.image_arch }}
          path: downloaded-images

      - name: Load integration images
        run: podman load -i downloaded-images/control-plane-images.tar

      - name: Log in to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Prepare DHI images
        if: needs.helper-image-changes.outputs.yamllint_changed == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./scripts/prepare-dhi-images.sh

      - name: Build yamllint image for publishing
        if: needs.helper-image-changes.outputs.yamllint_changed == 'true'
        run: podman build --tag localhost/yamllint:test containers/yamllint

      - name: Build sccache image for publishing
        if: needs.helper-image-changes.outputs.sccache_changed == 'true'
        run: podman build --tag localhost/sccache:test containers/sccache

      - name: Build sccache-dist image for publishing
        if: needs.helper-image-changes.outputs.sccache_dist_changed == 'true' && matrix.image_arch == 'amd64'
        run: podman build --tag localhost/sccache-dist:test containers/sccache-dist

      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          yamllint_version="$(sed -n 's/^ARG YAMLLINT_VERSION=//p' containers/yamllint/Dockerfile)"
          sccache_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache/Dockerfile)"
          sccache_dist_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache-dist/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${yamllint_version}"
          test -n "${sccache_version}"
          test -n "${sccache_dist_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
          printf 'yamllint_component_tag=%s\n' "${yamllint_version}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_component_tag=%s\n' "${sccache_version}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_dist_component_tag=%s\n' "${sccache_dist_version}" >> "${GITHUB_OUTPUT}"

      - name: Publish architecture image tags
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_YAMLLINT_IMAGE: ghcr.io/${{ github.repository }}/yamllint
          GHCR_SCCACHE_IMAGE: ghcr.io/${{ github.repository }}/sccache
          GHCR_SCCACHE_DIST_IMAGE: ghcr.io/${{ github.repository }}/sccache-dist
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCH: ${{ matrix.image_arch }}
          PUBLISH_YAMLLINT: ${{ needs.helper-image-changes.outputs.yamllint_changed }}
          PUBLISH_SCCACHE: ${{ needs.helper-image-changes.outputs.sccache_changed }}
          PUBLISH_SCCACHE_DIST: ${{ needs.helper-image-changes.outputs.sccache_dist_changed }}
        run: |
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman tag localhost/control-plane:test "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}-${IMAGE_ARCH}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
          podman push "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}-${IMAGE_ARCH}"
          if [[ "${PUBLISH_YAMLLINT}" == "true" ]]; then
            podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman tag localhost/yamllint:test "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}-${IMAGE_ARCH}"
            podman push "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman push "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}-${IMAGE_ARCH}"
          fi
          if [[ "${PUBLISH_SCCACHE}" == "true" ]]; then
            podman tag localhost/sccache:test "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman tag localhost/sccache:test "${GHCR_SCCACHE_IMAGE}:${{ steps.image_versions.outputs.sccache_component_tag }}-${IMAGE_ARCH}"
            podman push "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman push "${GHCR_SCCACHE_IMAGE}:${{ steps.image_versions.outputs.sccache_component_tag }}-${IMAGE_ARCH}"
          fi
          if [[ "${PUBLISH_SCCACHE_DIST}" == "true" ]] && [[ "${IMAGE_ARCH}" == "amd64" ]]; then
            podman tag localhost/sccache-dist:test "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman tag localhost/sccache-dist:test "${GHCR_SCCACHE_DIST_IMAGE}:${{ steps.image_versions.outputs.sccache_dist_component_tag }}-${IMAGE_ARCH}"
            podman push "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}-${IMAGE_ARCH}"
            podman push "${GHCR_SCCACHE_DIST_IMAGE}:${{ steps.image_versions.outputs.sccache_dist_component_tag }}-${IMAGE_ARCH}"
          fi

  publish-manifests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs:
      - publish-architecture-images
      - helper-image-changes
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Podman toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Read published image versions
        id: image_versions
        run: |
          control_plane_version="$(sed -n 's/^ARG COPILOT_CLI_VERSION=//p' containers/control-plane/Dockerfile)"
          yamllint_version="$(sed -n 's/^ARG YAMLLINT_VERSION=//p' containers/yamllint/Dockerfile)"
          sccache_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache/Dockerfile)"
          sccache_dist_version="$(sed -n 's/^ARG SCCACHE_VERSION=//p' containers/sccache-dist/Dockerfile)"
          test -n "${control_plane_version}"
          test -n "${yamllint_version}"
          test -n "${sccache_version}"
          test -n "${sccache_dist_version}"
          printf 'control_plane_component_tag=copilot-%s\n' "${control_plane_version}" >> "${GITHUB_OUTPUT}"
          printf 'yamllint_component_tag=%s\n' "${yamllint_version}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_component_tag=%s\n' "${sccache_version}" >> "${GITHUB_OUTPUT}"
          printf 'sccache_dist_component_tag=%s\n' "${sccache_dist_version}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish GHCR multi-arch manifests
        env:
          GHCR_CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository }}/control-plane
          GHCR_YAMLLINT_IMAGE: ghcr.io/${{ github.repository }}/yamllint
          GHCR_SCCACHE_IMAGE: ghcr.io/${{ github.repository }}/sccache
          GHCR_SCCACHE_DIST_IMAGE: ghcr.io/${{ github.repository }}/sccache-dist
          GITHUB_SHA: ${{ github.sha }}
          PUBLISH_YAMLLINT: ${{ needs.helper-image-changes.outputs.yamllint_changed }}
          PUBLISH_SCCACHE: ${{ needs.helper-image-changes.outputs.sccache_changed }}
          PUBLISH_SCCACHE_DIST: ${{ needs.helper-image-changes.outputs.sccache_dist_changed }}
        run: |
          create_manifest() {
            local manifest_name="$1"
            local target_ref="$2"
            shift 2
            podman manifest rm "${manifest_name}" >/dev/null 2>&1 || true
            podman manifest create "${manifest_name}"
            for source_ref in "$@"; do
              podman manifest add "${manifest_name}" "docker://${source_ref}"
            done
            podman manifest push --all "${manifest_name}" "docker://${target_ref}"
          }

          create_manifest "localhost/control-plane:manifest-sha" "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/control-plane:manifest-latest" "${GHCR_CONTROL_PLANE_IMAGE}:latest" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"
          create_manifest "localhost/control-plane:manifest-version" "${GHCR_CONTROL_PLANE_IMAGE}:${{ steps.image_versions.outputs.control_plane_component_tag }}" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-amd64" \
            "${GHCR_CONTROL_PLANE_IMAGE}:${GITHUB_SHA}-arm64"

          if [[ "${PUBLISH_YAMLLINT}" == "true" ]]; then
            create_manifest "localhost/yamllint:manifest-sha" "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "localhost/yamllint:manifest-latest" "${GHCR_YAMLLINT_IMAGE}:latest" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "localhost/yamllint:manifest-version" "${GHCR_YAMLLINT_IMAGE}:${{ steps.image_versions.outputs.yamllint_component_tag }}" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_YAMLLINT_IMAGE}:${GITHUB_SHA}-arm64"
          fi

          if [[ "${PUBLISH_SCCACHE}" == "true" ]]; then
            create_manifest "localhost/sccache:manifest-sha" "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "localhost/sccache:manifest-latest" "${GHCR_SCCACHE_IMAGE}:latest" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
            create_manifest "localhost/sccache:manifest-version" "${GHCR_SCCACHE_IMAGE}:${{ steps.image_versions.outputs.sccache_component_tag }}" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-amd64" \
              "${GHCR_SCCACHE_IMAGE}:${GITHUB_SHA}-arm64"
          fi
          if [[ "${PUBLISH_SCCACHE_DIST}" == "true" ]]; then
            create_manifest "localhost/sccache-dist:manifest-sha" "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}" \
              "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}-amd64"
            create_manifest "localhost/sccache-dist:manifest-latest" "${GHCR_SCCACHE_DIST_IMAGE}:latest" \
              "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}-amd64"
            create_manifest "localhost/sccache-dist:manifest-version" "${GHCR_SCCACHE_DIST_IMAGE}:${{ steps.image_versions.outputs.sccache_dist_component_tag }}" \
              "${GHCR_SCCACHE_DIST_IMAGE}:${GITHUB_SHA}-amd64"
          fi

  cleanup-packages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: publish-manifests
    permissions:
      contents: read
      packages: write
    env:
      GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP: "30"
    strategy:
      fail-fast: false
      matrix:
        package_suffix:
          - control-plane
          - yamllint
          - sccache
          - sccache-dist
    steps:
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5.0.0
        with:
          owner: ${{ github.repository_owner }}
          package-name: ${{ format('{0}/{1}', github.event.repository.name, matrix.package_suffix) }}
          package-type: container
          min-versions-to-keep: ${{ env.GHCR_MIN_UNTAGGED_VERSIONS_TO_KEEP }}
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
