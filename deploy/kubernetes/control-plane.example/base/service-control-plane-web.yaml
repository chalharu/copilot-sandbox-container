apiVersion: v1
kind: Service
metadata:
  name: control-plane-web
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 8080
      targetPort: http
