apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/component: acp
  ports:
    - name: acp
      port: 3000
      targetPort: acp
