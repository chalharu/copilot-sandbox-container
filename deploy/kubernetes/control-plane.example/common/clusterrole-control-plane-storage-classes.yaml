apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-plane-storage-classes
# Allow the control-plane ServiceAccount to resolve the cluster default
# StorageClass when fast-exec ephemeral storage does not set one explicitly.
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["list"]
