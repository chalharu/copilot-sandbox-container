apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-exec-pods
  namespace: copilot-sandbox
# Bind only the control-plane ServiceAccount in the dedicated control-plane
# namespace; do not reuse this RoleBinding in a shared workload namespace.
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: copilot-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-exec-pods
