apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-bootstrap-secret-writer
  namespace: copilot-sandbox
rules:
  # `create` cannot be scoped with `resourceNames`, so keep it isolated from
  # the exact-name update rule below.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["garage-sccache-auth"]
    verbs: ["get", "patch", "update"]
