apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-instance-env
  namespace: copilot-sandbox
data:
  # Keep these values tied to the shipped control-plane instance resources so a
  # named overlay can change image / Service / PVC names in one place and let
  # kustomize replacements carry the derived env settings.
  CONTROL_PLANE_ACP_HOST: control-plane.copilot-sandbox.svc.cluster.local
  CONTROL_PLANE_ACP_PORT: "3000"
  CONTROL_PLANE_WEB_PORT: "8080"
  CONTROL_PLANE_WORKSPACE_PVC: control-plane-workspace-pvc
  CONTROL_PLANE_FAST_EXECUTION_BOOTSTRAP_IMAGE: ghcr.io/chalharu/copilot-sandbox-container/control-plane:latest
  CONTROL_PLANE_FAST_EXECUTION_BOOTSTRAP_IMAGE_PULL_POLICY: IfNotPresent
  CONTROL_PLANE_JOB_TRANSFER_IMAGE: ghcr.io/chalharu/copilot-sandbox-container/control-plane:latest
  CONTROL_PLANE_JOB_TRANSFER_ROOT: /home/copilot/.copilot/session-state/job-transfers
  CONTROL_PLANE_JOB_TRANSFER_HOST: control-plane-web.copilot-sandbox.svc.cluster.local
  CONTROL_PLANE_JOB_TRANSFER_PORT: "8080"
  CONTROL_PLANE_JOB_IMAGE_PULL_POLICY: IfNotPresent
