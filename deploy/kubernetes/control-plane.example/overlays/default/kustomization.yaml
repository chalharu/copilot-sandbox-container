apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: []

# This overlay is the customization point for the shipped sample.
# The shipped root sample reads the individual files under `../base/` directly.
# Use this file as a commented scratchpad when you prepare a named variant and
# then compose that variant with the individual files under `../../common/`.
#
# When you need a named variant instead, uncomment the block below and replace
# the `replace-me-*` values with your own instance-specific names.
#
# patchesJson6902:
#   - target:
#       version: v1
#       kind: PersistentVolumeClaim
#       name: control-plane-workspace-pvc
#     path: workspace-pvc-patch.yaml
#   - target:
#       version: v1
#       kind: Service
#       name: control-plane
#     path: service-patch.yaml
#   - target:
#       group: apps
#       version: v1
#       kind: Deployment
#       name: control-plane
#     path: deployment-patch.yaml
#   - target:
#       group: apps
#       version: v1
#       kind: Deployment
#       name: control-plane
#     path: deployment-image-patch.yaml
#
# Candidate `workspace-pvc-patch.yaml`:
# - op: replace
#   path: /metadata/name
#   value: replace-me-with-workspace-pvc-name
# - op: replace
#   path: /spec/storageClassName
#   value: replace-me-with-workspace-storage-class
# - op: replace
#   path: /spec/resources/requests/storage
#   value: 8Gi
#   # Remove the storage op when the default size is already fine.
# Shared PVC candidates such as `control-plane-copilot-session-pvc` and
# `control-plane-sccache-pvc` live in `../../install/`
# because the root kustomization intentionally avoids mutating those immutable
# shared claims during routine updates.
#
# Candidate `service-patch.yaml`:
# - op: replace
#   path: /metadata/name
#   value: replace-me-with-service-name
# - op: replace
#   path: /metadata/labels/app.kubernetes.io~1name
#   value: replace-me-with-instance-label
# - op: replace
#   path: /spec/selector/app.kubernetes.io~1name
#   value: replace-me-with-instance-label
#
# Candidate `deployment-patch.yaml`:
# - op: replace
#   path: /metadata/name
#   value: replace-me-with-deployment-name
# - op: replace
#   path: /metadata/labels/app.kubernetes.io~1name
#   value: replace-me-with-instance-label
# - op: replace
#   path: /spec/selector/matchLabels/app.kubernetes.io~1name
#   value: replace-me-with-instance-label
# - op: replace
#   path: /spec/template/metadata/labels/app.kubernetes.io~1name
#   value: replace-me-with-instance-label
# - op: test
#   path: /spec/template/spec/volumes/1/name
#   value: workspace
# - op: replace
#   path: /spec/template/spec/volumes/1/persistentVolumeClaim/claimName
#   value: replace-me-with-workspace-pvc-name
#
# Candidate `deployment-image-patch.yaml`:
# - op: replace
#   path: /spec/template/spec/containers/0/image
#   value: ghcr.io/chalharu/copilot-sandbox-container/control-plane:replace-me-with-commit-sha
# Keep the same tag aligned in `../../common/configmap-control-plane-env.yaml`
# for `CONTROL_PLANE_JOB_TRANSFER_IMAGE` and in
# `../../common/job-garage-bootstrap.yaml` for the `garage-bootstrap` Job image.
