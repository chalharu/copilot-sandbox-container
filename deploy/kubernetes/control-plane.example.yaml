apiVersion: v1
kind: Namespace
metadata:
  name: copilot-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: copilot-sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: copilot-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-jobs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-state-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: Pod
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  serviceAccountName: control-plane
  restartPolicy: Always
  initContainers:
    - name: init-state
      # renovate: datasource=docker depName=busybox versioning=docker
      image: busybox:1.37.0
      command:
        - sh
        - -c
        - mkdir -p /state/copilot /state/gh /state/ssh /state/workspace && chmod 700 /state/ssh
      volumeMounts:
        - name: state
          mountPath: /state
  containers:
    - name: control-plane
      image: ghcr.io/chalharu/copilot-sandbox-container/control-plane:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: SSH_PUBLIC_KEY
          value: "ssh-ed25519 AAAA... replace-me"
        - name: CONTROL_PLANE_K8S_NAMESPACE
          value: copilot-sandbox
        - name: CONTROL_PLANE_WORKSPACE_PVC
          value: control-plane-state-pvc
        - name: CONTROL_PLANE_WORKSPACE_SUBPATH
          value: workspace
        - name: CONTROL_PLANE_JOB_SERVICE_ACCOUNT
          value: control-plane
        - name: CONTROL_PLANE_JOB_IMAGE_PULL_POLICY
          value: IfNotPresent
        - name: CONTROL_PLANE_JOB_CPU_REQUEST
          value: 250m
        - name: CONTROL_PLANE_JOB_CPU_LIMIT
          value: "2"
        - name: CONTROL_PLANE_JOB_MEMORY_REQUEST
          value: 256Mi
        - name: CONTROL_PLANE_JOB_MEMORY_LIMIT
          value: 2Gi
      ports:
        - containerPort: 2222
          name: ssh
      readinessProbe:
        tcpSocket:
          port: ssh
        periodSeconds: 5
        failureThreshold: 12
      livenessProbe:
        tcpSocket:
          port: ssh
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 6
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeMounts:
        - name: state
          mountPath: /home/copilot/.copilot
          subPath: copilot
        - name: state
          mountPath: /home/copilot/.config/gh
          subPath: gh
        - name: state
          mountPath: /home/copilot/.ssh
          subPath: ssh
        - name: state
          mountPath: /workspace
          subPath: workspace
  volumes:
    - name: state
      persistentVolumeClaim:
        claimName: control-plane-state-pvc
