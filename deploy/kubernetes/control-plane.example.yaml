apiVersion: v1
kind: Namespace
metadata:
  name: copilot-sandbox
---
apiVersion: v1
kind: Namespace
metadata:
  name: copilot-sandbox-jobs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: copilot-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-job
  namespace: copilot-sandbox-jobs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox-jobs
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: copilot-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-jobs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-job-self-read
  namespace: copilot-sandbox-jobs
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-job-self-read
  namespace: copilot-sandbox-jobs
subjects:
  - kind: ServiceAccount
    name: control-plane-job
    namespace: copilot-sandbox-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-job-self-read
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-state-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-session-state-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  # Replace this with an RWX-capable storage class. Many default `standard`
  # classes are ReadWriteOnce only and cannot satisfy session-state sharing.
  storageClassName: replace-me-with-rwx-storage-class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-workspace-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-rootful-podman-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-auth
  namespace: copilot-sandbox
type: Opaque
stringData:
  ssh-public-key: |
    ssh-ed25519 AAAA... replace-me
  # Optional: a fine-grained PAT for gh CLI. The entrypoint renders
  # ~/.config/gh/hosts.yml from this Secret unless you provide gh-hosts.yml.
  # gh-github-token: github_pat_... replace-me
  # Optional: provide a full gh hosts.yml when you need custom git_protocol,
  # multiple hosts, or GitHub Enterprise entries. This file wins over
  # gh-github-token when both are present.
  # gh-hosts.yml: |
  #   github.com:
  #     oauth_token: github_pat_... replace-me
  #     git_protocol: ssh
  #     user: octocat
  # Optional: add a fine-grained PAT with Copilot access when you want the
  # control plane to start with COPILOT_GITHUB_TOKEN configured.
  # The entrypoint copies it into a private runtime file and only injects it
  # into the Copilot process via --secret-env-vars=COPILOT_GITHUB_TOKEN.
  # copilot-github-token: github_pat_... replace-me
  # Optional: Docker Hub credentials for DHI image pulls. The entrypoint copies
  # them into private runtime files and `scripts/prepare-dhi-images.sh` reads
  # the file paths without exporting the raw secret values into the login shell.
  # dockerhub-username: your-dockerhub-user
  # dockerhub-token: dckr_pat_... replace-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: copilot-sandbox
data:
  # The entrypoint deep-merges this object onto any existing
  # ~/.copilot/config.json stored on the PVC.
  copilot-config.json: |
    {
      "telemetry": false
    }
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
    spec:
      # The current cluster leaves `hostUsers: false` Pods stuck in
      # ContainerCreating, so this sample keeps the default `hostUsers: true`
      # path and uses a rootful Podman remote service for local in-Pod
      # containers instead of relying on nested rootless user namespaces.
      securityContext:
        fsGroup: 1000
      serviceAccountName: control-plane
      initContainers:
        - name: init-state-dirs
          # renovate: datasource=docker depName=busybox versioning=docker
          image: busybox:1.37.0@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          command:
            - sh
            - -c
            - |
              set -eu
              umask 077
              mkdir -p /state/gh /state/ssh /state/ssh-host-keys /workspace-state/workspace /session-state
              touch /state/copilot-config.json
              chown -R 1000:1000 /state/gh /state/ssh /state/ssh-host-keys /session-state
              find /state/gh /state/ssh /state/ssh-host-keys /session-state -type d -exec chmod 700 {} +
              find /state/gh /state/ssh /state/ssh-host-keys /session-state -type f -exec chmod 600 {} +
              # Preserve user workspace file modes; only hand the shared mount root
              # back to UID/GID 1000 so the control-plane session can use it.
              chown 1000:1000 /workspace-state/workspace
              chown 1000:1000 /state/copilot-config.json
              chmod 700 /workspace-state/workspace
              chmod 600 /state/copilot-config.json
              rm -rf /var/lib/control-plane/rootful-podman/*
              mkdir -p /var/lib/control-plane/rootful-podman/rootful-overlay
          securityContext:
            privileged: false
            runAsUser: 0
            runAsGroup: 1000
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: state
              mountPath: /state
            - name: session-state
              mountPath: /session-state
            - name: workspace
              mountPath: /workspace-state
            - name: rootful-podman
              mountPath: /var/lib/control-plane/rootful-podman
        - name: init-state
          # renovate: datasource=docker depName=busybox versioning=docker
          image: busybox:1.37.0@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          command:
            - sh
            - -c
            - |
              set -eu
              umask 077
              [ -s /state/copilot-config.json ] || cat > /state/copilot-config.json <<'JSON'
              {
                "telemetry": false
              }
              JSON
          securityContext:
            privileged: false
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: state
              mountPath: /state
      containers:
        - name: control-plane
          # Pin deployments to a published commit SHA tag so the running image
          # matches the revision you intend to operate.
          image: ghcr.io/chalharu/copilot-sandbox-container/control-plane:replace-me-with-commit-sha
          imagePullPolicy: IfNotPresent
          env:
            - name: SSH_PUBLIC_KEY_FILE
              value: /var/run/control-plane-auth/ssh-public-key
            - name: COPILOT_CONFIG_JSON_FILE
              value: /var/run/control-plane-config/copilot-config.json
            # Optional: uncomment when the Secret contains gh-github-token.
            # - name: GH_GITHUB_TOKEN_FILE
            #   value: /var/run/control-plane-auth/gh-github-token
            # Optional: uncomment when the Secret contains gh-hosts.yml.
            # This full file wins over GH_GITHUB_TOKEN_FILE.
            # - name: GH_HOSTS_YML_FILE
            #   value: /var/run/control-plane-auth/gh-hosts.yml
            - name: COPILOT_GITHUB_TOKEN_FILE
              value: /var/run/control-plane-auth/copilot-github-token
            - name: DOCKERHUB_USERNAME_FILE
              value: /var/run/control-plane-auth/dockerhub-username
            - name: DOCKERHUB_TOKEN_FILE
              value: /var/run/control-plane-auth/dockerhub-token
            # Optional: preseed ~/.gitconfig inside the control plane.
            # - name: CONTROL_PLANE_GIT_USER_NAME
            #   value: Your Name
            # - name: CONTROL_PLANE_GIT_USER_EMAIL
            #   value: you@example.com
            - name: CONTROL_PLANE_K8S_NAMESPACE
              value: copilot-sandbox
            - name: CONTROL_PLANE_JOB_NAMESPACE
              value: copilot-sandbox-jobs
            - name: CONTROL_PLANE_WORKSPACE_PVC
              value: control-plane-workspace-pvc
            - name: CONTROL_PLANE_WORKSPACE_SUBPATH
              value: workspace
            # Optional: when the job namespace has its own shared workspace PVC
            # that exposes the same repository contents, mount it into Jobs too.
            # Otherwise keep Jobs stateless and use `--mount-file`, which stages
            # input files over SSH/SFTP via rclone and writes modified files back
            # when the Job completes.
            # - name: CONTROL_PLANE_JOB_WORKSPACE_PVC
            #   value: control-plane-workspace-pvc
            # - name: CONTROL_PLANE_JOB_WORKSPACE_SUBPATH
            #   value: workspace
            - name: CONTROL_PLANE_JOB_INPUT_MOUNT_PATH
              value: /var/run/control-plane/job-inputs
            - name: CONTROL_PLANE_JOB_TRANSFER_IMAGE
              value: ghcr.io/chalharu/copilot-sandbox-container/control-plane:replace-me-with-commit-sha
            - name: CONTROL_PLANE_JOB_TRANSFER_HOST
              value: control-plane.copilot-sandbox.svc.cluster.local
            - name: CONTROL_PLANE_JOB_TRANSFER_PORT
              value: "2222"
            - name: CONTROL_PLANE_JOB_SERVICE_ACCOUNT
              value: control-plane-job
            # Keep Kubernetes Jobs as the default path in the least-privilege
            # profile. Local Podman still works on the current cluster through a
            # rootful remote service when you explicitly opt into `podman`.
            - name: CONTROL_PLANE_RUN_MODE
              value: k8s-job
            # Current-cluster local Podman profile: run a rootful remote service
            # inside the control-plane container. The rootful image store stays
            # on its own PVC under /var/lib/control-plane/rootful-podman, while
            # the runtime dir moves to a disk-backed emptyDir under
            # /var/tmp/control-plane/rootful-overlay so Podman temp data avoids
            # tmpfs-backed /run without bloating the shared workspace PVC.
            - name: CONTROL_PLANE_LOCAL_PODMAN_MODE
              value: rootful-service
            - name: CONTROL_PLANE_ROOTFUL_PODMAN_STORAGE_DRIVER
              value: overlay
            - name: CONTROL_PLANE_ROOTFUL_PODMAN_RUNTIME_DIR
              value: /var/tmp/control-plane/rootful-overlay
            # `cpulimit` treats 100 as roughly one CPU core, which keeps an
            # interactive Copilot session from monopolizing the node.
            - name: CONTROL_PLANE_COPILOT_CPU_LIMIT_PERCENT
              value: "100"
            - name: CONTROL_PLANE_JOB_IMAGE_PULL_POLICY
              value: IfNotPresent
            - name: CONTROL_PLANE_JOB_CPU_REQUEST
              value: 250m
            - name: CONTROL_PLANE_JOB_CPU_LIMIT
              value: "2"
            - name: CONTROL_PLANE_JOB_MEMORY_REQUEST
              value: 256Mi
            - name: CONTROL_PLANE_JOB_MEMORY_LIMIT
              value: 2Gi
          # Keep `drop: ALL`, but re-add the capabilities that SSH startup and
          # the current-cluster rootful Podman remote-service fallback need.
          # This stays `privileged: false`, yet still lets local `podman run`
          # work on the current node runtime by combining:
          # - AUDIT_WRITE plus KILL for sshd PTY login accounting and preauth cleanup
          # - MKNOD / NET_ADMIN / SETFCAP / SETPCAP / SYS_ADMIN for nested
          #   rootful Podman on this cluster
          # - unconfined seccomp/AppArmor so the nested runtime can manage its
          #   own cgroups and network namespace details
          securityContext:
            privileged: false
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - AUDIT_WRITE
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - KILL
                - MKNOD
                - NET_ADMIN
                - SETFCAP
                - SETGID
                - SETPCAP
                - SETUID
                - SYS_ADMIN
                - SYS_CHROOT
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
          ports:
            - containerPort: 2222
              name: ssh
          readinessProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: state
              mountPath: /home/copilot/.copilot/config.json
              subPath: copilot-config.json
            - name: session-state
              mountPath: /home/copilot/.copilot/session-state
            - name: state
              mountPath: /home/copilot/.config/gh
              subPath: gh
            - name: state
              mountPath: /home/copilot/.ssh
              subPath: ssh
            - name: state
              mountPath: /var/lib/control-plane/ssh-host-keys
              subPath: ssh-host-keys
            - name: workspace
              mountPath: /workspace
              subPath: workspace
            - name: rootful-podman
              mountPath: /var/lib/control-plane/rootful-podman
            - name: runtime-tmp
              mountPath: /var/tmp/control-plane
            # Optional advanced rootless profile: if your cluster really
            # supports `hostUsers: false`, `/dev/fuse`, and nested user
            # namespaces, you can switch CONTROL_PLANE_LOCAL_PODMAN_MODE back to
            # `rootless` and mount /dev/fuse for fuse-overlayfs.
            # - name: fuse-device
            #   mountPath: /dev/fuse
            # Optional advanced rootless profile: /dev/net/tun enables
            # slirp4netns networking when you are not using the current-cluster
            # rootful-service fallback.
            # - name: tun-device
            #   mountPath: /dev/net/tun
            - name: control-plane-auth
              mountPath: /var/run/control-plane-auth
              readOnly: true
            - name: control-plane-config
              mountPath: /var/run/control-plane-config
              readOnly: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: control-plane-state-pvc
        - name: session-state
          persistentVolumeClaim:
            claimName: control-plane-session-state-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: control-plane-workspace-pvc
        - name: rootful-podman
          persistentVolumeClaim:
            claimName: control-plane-rootful-podman-pvc
        - name: runtime-tmp
          emptyDir: {}
        # Optional advanced rootless profile: if your cluster policy allows
        # hostPath devices, mount /dev/fuse for fuse-overlayfs. On stricter
        # clusters use a device plugin-backed resource instead.
        # - name: fuse-device
        #   hostPath:
        #     path: /dev/fuse
        #     type: CharDevice
        # Optional advanced rootless profile: if your cluster policy allows
        # hostPath devices, mount /dev/net/tun for slirp4netns. On stricter
        # clusters use a device plugin-backed resource instead.
        # - name: tun-device
        #   hostPath:
        #     path: /dev/net/tun
        #     type: CharDevice
        - name: control-plane-auth
          secret:
            secretName: control-plane-auth
        - name: control-plane-config
          configMap:
            name: control-plane-config
