apiVersion: v1
kind: Namespace
metadata:
  name: copilot-sandbox
---
apiVersion: v1
kind: Namespace
metadata:
  name: copilot-sandbox-jobs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: copilot-sandbox
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-job
  namespace: copilot-sandbox-jobs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-jobs
  namespace: copilot-sandbox-jobs
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: copilot-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-jobs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-state-pvc
  namespace: copilot-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-auth
  namespace: copilot-sandbox
type: Opaque
stringData:
  ssh-public-key: |
    ssh-ed25519 AAAA... replace-me
  # Optional: add a fine-grained PAT with Copilot access when you want the
  # control plane to start with COPILOT_GITHUB_TOKEN configured.
  # The entrypoint copies it into a private runtime file and only injects it
  # into the Copilot process via --secret-env-vars=COPILOT_GITHUB_TOKEN.
  # copilot-github-token: github_pat_... replace-me
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: copilot-sandbox
  labels:
    app.kubernetes.io/name: control-plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
    spec:
      # Opt into Kubernetes Pod user namespaces so root in the Pod maps to a
      # non-root host UID/GID. This materially improves the chance that nested
      # rootless Podman can create its own user namespace when the node runtime
      # supports it.
      hostUsers: false
      securityContext:
        fsGroup: 1000
      serviceAccountName: control-plane
      initContainers:
        - name: init-state
          # renovate: datasource=docker depName=busybox versioning=docker
          image: busybox:1.37.0@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          command:
            - sh
            - -c
            - umask 077 && mkdir -p /state/copilot /state/gh /state/ssh /state/ssh-host-keys /state/workspace
          securityContext:
            privileged: false
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: state
              mountPath: /state
      containers:
        - name: control-plane
          image: ghcr.io/chalharu/copilot-sandbox-container/control-plane:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SSH_PUBLIC_KEY_FILE
              value: /var/run/control-plane-auth/ssh-public-key
            - name: COPILOT_GITHUB_TOKEN_FILE
              value: /var/run/control-plane-auth/copilot-github-token
            # Optional: preseed ~/.gitconfig inside the control plane.
            # - name: CONTROL_PLANE_GIT_USER_NAME
            #   value: Your Name
            # - name: CONTROL_PLANE_GIT_USER_EMAIL
            #   value: you@example.com
            - name: CONTROL_PLANE_K8S_NAMESPACE
              value: copilot-sandbox
            - name: CONTROL_PLANE_JOB_NAMESPACE
              value: copilot-sandbox-jobs
            - name: CONTROL_PLANE_WORKSPACE_PVC
              value: control-plane-state-pvc
            - name: CONTROL_PLANE_WORKSPACE_SUBPATH
              value: workspace
            # Optional: when the job namespace has its own shared workspace PVC
            # that exposes the same repository contents, mount it into Jobs too.
            # Otherwise keep Jobs stateless and hand small inputs over with
            # `control-plane-run --mount-file ...`.
            # - name: CONTROL_PLANE_JOB_WORKSPACE_PVC
            #   value: control-plane-workspace-pvc
            # - name: CONTROL_PLANE_JOB_WORKSPACE_SUBPATH
            #   value: workspace
            - name: CONTROL_PLANE_JOB_INPUT_MOUNT_PATH
              value: /var/run/control-plane/job-inputs
            - name: CONTROL_PLANE_JOB_SERVICE_ACCOUNT
              value: control-plane-job
            # Keep Kubernetes Jobs as the default path in the least-privilege
            # profile. If you explicitly opt into privileged local Podman,
            # switch this to `auto` or pass --mode podman per command.
            - name: CONTROL_PLANE_RUN_MODE
              value: k8s-job
            # Optional: force the local Podman storage driver. When /dev/fuse is
            # unavailable, the entrypoint now falls back to `vfs` automatically.
            # This does not solve user-namespace failures by itself; keep
            # `hostUsers: false` and the outer runtime prerequisites in place.
            # - name: CONTROL_PLANE_PODMAN_STORAGE_DRIVER
            #   value: vfs
            - name: CONTROL_PLANE_JOB_IMAGE_PULL_POLICY
              value: IfNotPresent
            - name: CONTROL_PLANE_JOB_CPU_REQUEST
              value: 250m
            - name: CONTROL_PLANE_JOB_CPU_LIMIT
              value: "2"
            - name: CONTROL_PLANE_JOB_MEMORY_REQUEST
              value: 256Mi
            - name: CONTROL_PLANE_JOB_MEMORY_LIMIT
              value: 2Gi
          # Keep a least-privilege SSH/Copilot profile by default. `drop: ALL`
          # only works because we re-add CHOWN/DAC_OVERRIDE/FOWNER/SETFCAP/
          # SETGID/SETUID/SYS_CHROOT. `SETFCAP` keeps rootless Podman closer to
          # working on Linux 5.12+, but local nested Podman/Kind remains
          # best-effort even in privileged Pods because the outer runtime can
          # still block user namespaces. Jobs default to a separate namespace; use a
          # namespace-local workspace PVC there only when you really need one.
          securityContext:
            privileged: false
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETFCAP
                - SETGID
                - SETUID
                - SYS_CHROOT
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 2222
              name: ssh
          readinessProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: state
              mountPath: /home/copilot/.copilot
              subPath: copilot
            - name: state
              mountPath: /home/copilot/.config/gh
              subPath: gh
            - name: state
              mountPath: /home/copilot/.ssh
              subPath: ssh
            - name: state
              mountPath: /var/lib/control-plane/ssh-host-keys
              subPath: ssh-host-keys
            - name: state
              mountPath: /workspace
              subPath: workspace
            # Optional: expose /dev/fuse when the cluster allows it so local
            # rootless Podman can use fuse-overlayfs instead of always falling
            # back to the vfs storage driver.
            # - name: fuse-device
            #   mountPath: /dev/fuse
            - name: control-plane-auth
              mountPath: /var/run/control-plane-auth
              readOnly: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: control-plane-state-pvc
        # Optional: if your cluster policy allows hostPath devices, mount
        # /dev/fuse for fuse-overlayfs. On stricter clusters use a device
        # plugin-backed resource instead.
        # - name: fuse-device
        #   hostPath:
        #     path: /dev/fuse
        #     type: CharDevice
        - name: control-plane-auth
          secret:
            secretName: control-plane-auth
