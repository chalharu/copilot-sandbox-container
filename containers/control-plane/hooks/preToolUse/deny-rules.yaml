- toolName: bash
  column: command
  rules:
    - all:
        - '^basename:git$'
        - '^arg:commit$'
      any:
        - '^arg:--no-verify$'
        - '^arg:-n$'
      reason: git commit --no-verify is blocked by control-plane policy. Run git commit without --no-verify so hooks stay enforced.
    - all:
        - '^basename:git$'
        - '^arg:push$'
        - '^arg:--no-verify$'
      reason: git push --no-verify is blocked by control-plane policy. Run git push without --no-verify so push hooks still run.
    - all:
        - '^basename:git$'
        - '^arg:push$'
      any:
        - '^arg:--force$'
        - '^arg:-f$'
      reason: Force pushes are blocked by control-plane policy. Push without --force. Use --force-with-lease when you need a guarded overwrite.
    - all:
        - '^basename:git$'
      protectedEnv:
        - namePatterns:
            - '^GIT_CONFIG_GLOBAL$'
          allowValuePatterns:
            - '^${GIT_CONFIG_GLOBAL}$'
        - namePatterns:
            - '^GIT_CONFIG_SYSTEM$'
        - namePatterns:
            - '^GIT_CONFIG_NOSYSTEM$'
        - namePatterns:
            - '^GIT_CONFIG_COUNT$'
        - namePatterns:
            - '^GIT_CONFIG_KEY_[0-9]+$'
        - namePatterns:
            - '^GIT_CONFIG_VALUE_[0-9]+$'
        - namePatterns:
            - '^GIT_CONFIG_PARAMETERS$'
      reason: Git config environment overrides are blocked by control-plane policy. Use the managed Git config provided by the control plane.
