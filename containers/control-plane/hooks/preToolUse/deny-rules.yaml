commandRules:
  - rule: 'git(?:\x00[^\x00]+)*\x00(?:-c\x00(?i:core\.hookspath=.*)|-c(?i:core\.hookspath=.*)|--config-env\x00(?i:core\.hookspath=.*)|--config-env=(?i:core\.hookspath=.*))(?:\x00[^\x00]+)*'
    reason: git core.hooksPath overrides are blocked by control-plane policy. Use the managed hooks path provided by the control plane so hooks stay enforced.
  - rule: 'git(?:\x00[^\x00]+)*\x00commit(?:\x00[^\x00]+)*\x00(?:--no-verify|-[A-Za-z0-9]*n[A-Za-z0-9]*)(?:\x00[^\x00]+)*'
    reason: git commit --no-verify is blocked by control-plane policy. Run git commit without --no-verify so hooks stay enforced.
  - rule: 'git(?:\x00[^\x00]+)*\x00push(?:\x00[^\x00]+)*\x00--no-verify(?:\x00[^\x00]+)*'
    reason: git push --no-verify is blocked by control-plane policy. Run git push without --no-verify so push hooks still run.
  - rule: 'git(?:\x00[^\x00]+)*\x00push(?:\x00[^\x00]+)*\x00(?:--force|-[A-Za-z0-9]*f[A-Za-z0-9]*)(?:\x00[^\x00]+)*'
    reason: Force pushes are blocked by control-plane policy. Push without --force. Use --force-with-lease when you need a guarded overwrite.
  - rule: 'gh(?:\x00[^\x00]+)*\x00auth(?:\x00[^\x00]+)*\x00token(?:\x00[^\x00]+)*'
    reason: gh auth token is blocked by control-plane policy. Use gh commands that do not print tokens, or rely on the managed gh hosts configuration.
  - rule: 'gh(?:\x00[^\x00]+)*\x00pr\x00merge(?:\x00[^\x00]+)*'
    reason: gh pr merge is blocked by control-plane policy. Do not merge pull requests from the control plane.
  - rule: 'gh(?:\x00[^\x00]+)*\x00api(?:\x00[^\x00]+)*\x00(?:https://api\.github\.com)?/?repos/[^/\x00]+/[^/\x00]+/pulls/[0-9]+/merge(?:[?#][^\x00]*)?(?:\x00[^\x00]+)*'
    reason: GitHub pull request merge endpoints are blocked by control-plane policy. Do not merge pull requests from the control plane.
protectedEnvironments:
  - GIT_CONFIG_GLOBAL
  - GIT_CONFIG_SYSTEM
  - GIT_CONFIG_NOSYSTEM
  - GIT_CONFIG_COUNT
  - GIT_CONFIG_KEY_[0-9]+
  - GIT_CONFIG_VALUE_[0-9]+
  - GIT_CONFIG_PARAMETERS
fileAccessRules:
  - path: '${HOME}/.config/control-plane/copilot-github-token'
    reason: Direct reads of CONTROL_PLANE_COPILOT_GITHUB_TOKEN_FILE are blocked by control-plane policy. Use control-plane-copilot so the managed launcher injects the token without exposing the file contents.
    allowedExecutables:
      - /usr/local/bin/control-plane-copilot
  - path: '${HOME}/.config/gh/hosts.yml'
    reason: Direct reads of ~/.config/gh/hosts.yml are blocked by control-plane policy. Use gh so hosts.yml stays confined to the GitHub CLI.
    allowedExecutables:
      - /usr/bin/gh
  - path: /run/control-plane-auth
    reason: Direct reads of /run/control-plane-auth are blocked by control-plane policy. Startup consumes mounted auth Secrets and stages them into managed runtime surfaces; use ssh, gh, or control-plane-copilot instead of reading the Secret mount directly.
    allowedExecutables: []
