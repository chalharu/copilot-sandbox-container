commandRules:
  - rule:
      - git
      - anyOf:
          - -c(?i:core\.hookspath=.*)
          - seqOf:
              - -c
              - (?i:core\.hookspath=.*)
          - --config-env=(?i:core\.hookspath=.*)
          - seqOf:
              - --config-env
              - (?i:core\.hookspath=.*)
    reason: git core.hooksPath overrides are blocked by control-plane policy. Use the managed hooks path provided by the control plane so hooks stay enforced.
  - rule:
      - git
      - allOf:
          - commit
          - anyOf:
              - --no-verify
              - -[A-Za-z0-9]*n[A-Za-z0-9]*
    reason: git commit --no-verify is blocked by control-plane policy. Run git commit without --no-verify so hooks stay enforced.
  - rule:
      - git
      - allOf:
          - push
          - --no-verify
    reason: git push --no-verify is blocked by control-plane policy. Run git push without --no-verify so push hooks still run.
  - rule:
      - git
      - allOf:
          - push
          - anyOf:
              - --force
              - -[A-Za-z0-9]*f[A-Za-z0-9]*
    reason: Force pushes are blocked by control-plane policy. Push without --force. Use --force-with-lease when you need a guarded overwrite.
protectedEnvironments:
  - GIT_CONFIG_GLOBAL
  - GIT_CONFIG_SYSTEM
  - GIT_CONFIG_NOSYSTEM
  - GIT_CONFIG_COUNT
  - GIT_CONFIG_KEY_[0-9]+
  - GIT_CONFIG_VALUE_[0-9]+
  - GIT_CONFIG_PARAMETERS
